<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PODТЕКСТ — Artist Hub</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html { scroll-behavior: smooth; }
    body { background: #000; overflow-x: hidden; }
  </style>
</head>

<body class="text-white">

<!-- BACKGROUND -->
<div class="fixed inset-0 -z-10 overflow-hidden">
  <div class="absolute top-0 left-0 w-[600px] h-[600px] bg-purple-700/20 blur-3xl rounded-full"></div>
  <div class="absolute bottom-0 right-0 w-[600px] h-[600px] bg-blue-700/20 blur-3xl rounded-full"></div>
</div>

<!-- HEADER -->
<header class="sticky top-0 z-50 backdrop-blur-xl bg-black/40 border-b border-white/10">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 h-20 flex items-center justify-between">

    <img src="./logo.png" class="w-20 sm:w-24 h-auto object-contain" />

    <nav class="hidden md:flex gap-8 text-sm text-zinc-300">
      <a href="#releases">Дискография</a>
      <a href="#latest">Новинки</a>
      <a href="#platforms">Платформы</a>
    </nav>

    <a href="#platforms"
       class="bg-white text-black px-5 py-2 rounded-xl font-bold text-sm">
      Слушать
    </a>

  </div>
</header>

<!-- HERO -->
<section class="min-h-screen flex items-center px-4 sm:px-6 py-16">

  <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10 items-center">

    <div>

      <div class="text-xs sm:text-sm text-zinc-400 mb-4 tracking-[0.2em]">
        PODТЕКСТ
      </div>

      <h1 class="text-5xl sm:text-7xl font-black leading-none">
        <span class="text-zinc-500">MUSIC</span><br>
        <span class="text-white">HUB</span>
      </h1>

      <p class="text-zinc-400 mt-6 max-w-xl">
        Официальный хаб релизов и платформ.
      </p>

    </div>

    <img src="./hero3.png" class="rounded-3xl border border-white/10" />

  </div>
</section>

<!-- DISCOGRAPHY -->
<section id="releases" class="py-16 sm:py-24 px-4 sm:px-6 border-t border-white/10">

  <div class="max-w-7xl mx-auto">

    <h2 class="text-2xl sm:text-3xl font-black mb-10">
      Дискография
    </h2>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

      <!-- RELEASE 1 -->
      <div class="bg-white/5 border border-white/10 rounded-3xl overflow-hidden backdrop-blur-xl">

        <img src="./dve_sestry.png" class="w-full h-auto object-cover"/>

        <div class="p-5 sm:p-6">
          <h3 class="font-bold text-lg">Две сестры</h3>
          <p class="text-zinc-400 text-sm">Альбом</p>
        </div>

      </div>

      <!-- RELEASE 2 (SOON + TIMER) -->
      <div class="relative bg-white/5 border border-white/10 rounded-3xl overflow-hidden backdrop-blur-xl">

        <!-- overlay -->
        <div class="absolute inset-0 bg-black/60 z-10"></div>

        <!-- badge -->
        <div class="absolute top-4 left-4 z-20 bg-white text-black text-xs font-bold px-3 py-1 rounded-full">
          СКОРО РЕЛИЗ
        </div>

        <img src="./soon_album.png"
             class="w-full h-auto object-cover opacity-70"/>

        <div class="p-5 sm:p-6 relative z-20">

          <h3 class="font-bold text-lg text-zinc-300">
            Новый альбом
          </h3>

          <p class="text-zinc-500 text-sm mb-3">
            2026
          </p>

          <!-- TIMER -->
          <div class="grid grid-cols-4 gap-2 text-center text-xs sm:text-sm">

            <div>
              <div id="days" class="font-bold text-white">00</div>
              <div class="text-zinc-500">дней</div>
            </div>

            <div>
              <div id="hours" class="font-bold text-white">00</div>
              <div class="text-zinc-500">часов</div>
            </div>

            <div>
              <div id="minutes" class="font-bold text-white">00</div>
              <div class="text-zinc-500">мин</div>
            </div>

            <div>
              <div id="seconds" class="font-bold text-white">00</div>
              <div class="text-zinc-500">сек</div>
            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</section>

<!-- SCRIPT TIMER -->
<script>
const releaseDate = new Date("2026-09-01T00:00:00").getTime();

function updateTimer(){
  const now = new Date().getTime();
  const diff = releaseDate - now;

  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const s = Math.floor((diff % (1000 * 60)) / 1000);

  document.getElementById("days").innerText = d < 0 ? 0 : d;
  document.getElementById("hours").innerText = h < 0 ? 0 : h;
  document.getElementById("minutes").innerText = m < 0 ? 0 : m;
  document.getElementById("seconds").innerText = s < 0 ? 0 : s;
}

setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
